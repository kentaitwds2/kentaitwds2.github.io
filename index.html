<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Access</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; }
      .card { background: #2c2c2a !important; border-color: rgba(255,255,255,0.12) !important; }
      .card:hover { background: #3a3a37 !important; border-color: rgba(255,255,255,0.22) !important; }
      .card-title { color: #f0ede6 !important; }
      .card-sub { color: #888780 !important; }
      .label { color: #888780 !important; }
      .footer { color: #888780 !important; }
    }

    .wrapper {
      width: 100%;
      max-width: 480px;
    }

    .label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #888780;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 2rem 1.25rem;
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.15);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      cursor: pointer;
      font-family: inherit;
      outline: none;
    }

    .card:hover {
      background: #f1efe8;
      border-color: rgba(0,0,0,0.28);
    }

    .card:active {
      transform: scale(0.98);
    }

    .card-title {
      font-size: 15px;
      font-weight: 500;
      color: #2c2c2a;
    }

    .card-sub {
      font-size: 12px;
      color: #888780;
    }

    .footer {
      font-size: 12px;
      color: #b4b2a9;
      text-align: center;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <p class="label">Quick Access</p>
    <div class="grid">

     

      <button class="card"
         onclick="window.open('https://docs.google.com/spreadsheets/d/18ABRXEks-LDbf3_Z7inx7VzQOUi52kKh9d4QEn21PDc/edit?usp=sharing', '_blank', 'width=1200,height=800,noopener,noreferrer')">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
             stroke="#3b6d11" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.07 4.93l-1.41 1.41M5.34 18.66l-1.41 1.41M20 12h2M2 12H0M19.07 19.07l-1.41-1.41M5.34 5.34L3.93 3.93M12 20v2M12 2V0"></path>
        </svg>
        <span class="card-title">Config</span>
        <span class="card-sub">Edit spreadsheet</span>
      </button>

      <button class="card"
         onclick="window.open('https://kentaitwds2.app.n8n.cloud/form/170c6857-0af8-4c7d-b6d2-f85aec5a8839', '_blank', 'width=900,height=700,noopener,noreferrer')">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
             stroke="#185fa5" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"></polyline>
          <path d="M3.51 15a9 9 0 1 0 .49-3.51"></path>
        </svg>
        <span class="card-title">Update</span>
        <span class="card-sub">Submit form data</span>
      </button>

    </div>
    <p class="footer">Buttons open in a new window</p>
  </div>
</body>
</html>
