<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工具面板</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent1: #00e5ff;
      --accent2: #ff3cac;
      --accent3: #7fff6e;
      --text: #e8e8f0;
      --muted: #5a5a72;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glowing orbs */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, transparent 70%);
      top: -200px;
      left: -200px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 1rem;
    }

    .header .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .header h1 {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    button.btn {
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer;
      outline: none;
    }

    /* Buttons */
    .btn {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      width: 100%;
      padding: 1.2rem 1.8rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: inherit;
    }

    .btn:hover {
      transform: translateY(-3px);
    }

    .btn:active {
      transform: translateY(0px) scale(0.98);
    }

    /* Button 1 — 更新 */
    .btn-1 { --c: var(--accent1); }
    .btn-1::before { background: linear-gradient(135deg, rgba(0,229,255,0.08), transparent); }
    .btn-1:hover { border-color: var(--accent1); box-shadow: 0 0 24px rgba(0,229,255,0.2), inset 0 0 24px rgba(0,229,255,0.04); }
    .btn-1:hover::before { opacity: 1; }

    /* Button 2 — 設定 */
    .btn-2 { --c: var(--accent2); }
    .btn-2::before { background: linear-gradient(135deg, rgba(255,60,172,0.08), transparent); }
    .btn-2:hover { border-color: var(--accent2); box-shadow: 0 0 24px rgba(255,60,172,0.2), inset 0 0 24px rgba(255,60,172,0.04); }
    .btn-2:hover::before { opacity: 1; }

    /* Button 3 — 測試 */
    .btn-3 { --c: var(--accent3); }
    .btn-3::before { background: linear-gradient(135deg, rgba(127,255,110,0.08), transparent); }
    .btn-3:hover { border-color: var(--accent3); box-shadow: 0 0 24px rgba(127,255,110,0.2), inset 0 0 24px rgba(127,255,110,0.04); }
    .btn-3:hover::before { opacity: 1; }

    /* Icon circle */
    .btn-icon {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: 1px solid currentColor;
      color: var(--c);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: background 0.2s ease;
    }

    .btn:hover .btn-icon {
      background: color-mix(in srgb, var(--c) 15%, transparent);
    }

    /* Text block */
    .btn-text {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      flex: 1;
    }

    .btn-title {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--c);
    }

    .btn-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      word-break: break-all;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 320px;
    }

    /* Arrow */
    .btn-arrow {
      flex-shrink: 0;
      color: var(--muted);
      font-size: 1rem;
      transition: color 0.2s, transform 0.2s;
    }

    .btn:hover .btn-arrow {
      color: var(--c);
      transform: translateX(4px);
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    /* Footer */
    .footer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      margin-top: 0.5rem;
    }

    /* Entrance animation */
    .container { animation: fadeUp 0.5s ease both; }
    .btn:nth-child(3) { animation: fadeUp 0.5s 0.1s ease both; }
    .btn:nth-child(4) { animation: fadeUp 0.5s 0.2s ease both; }
    .btn:nth-child(5) { animation: fadeUp 0.5s 0.3s ease both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 400px) {
      .btn { padding: 1rem 1.2rem; gap: 1rem; }
      .btn-icon { width: 38px; height: 38px; font-size: 1rem; }
      .btn-title { font-size: 1rem; }
      .btn-sub { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="label">// CONTROL PANEL</div>
      <h1>工具面板</h1>
    </div>

    <div class="divider"></div>

    <button class="btn btn-1" onclick="window.open('https://kentaitwds2.app.n8n.cloud/form/6c47ec69-9a9a-4d5c-8704-e656e982ff97','_blank')">
      <div class="btn-icon">⟳</div>
      <div class="btn-text">
        <span class="btn-title">更新</span>
        <span class="btn-sub">n8n.cloud / form / e4879121…</span>
      </div>
      <span class="btn-arrow">→</span>
    </button>

    <button class="btn btn-3" onclick="window.open('https://kentaitwds2.github.io/off_days_viewer.html','_blank')">
      <div class="btn-icon">✦</div>
      <div class="btn-text">
        <span class="btn-title">測試</span>
        <span class="btn-sub">kentaitwds2.github.io / off_days_viewer.html</span>
      </div>
      <span class="btn-arrow">→</span>
    </button>

    <div class="divider"></div>
    <div class="footer">// RWD · 3 LINKS · READY</div>
  </div>
</body>
</html>
