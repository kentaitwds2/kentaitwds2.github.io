<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>功能連結選單</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            color: #333333;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            display: block;
            text-decoration: none;
            color: #ffffff;
            font-size: 18px;
            font-weight: 500;
            padding: 14px 20px;
            border-radius: 8px;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* Button Colors */
        .btn-sync {
            background-color: #4a90e2;
        }

        .btn-sync:hover {
            background-color: #357abd;
            transform: translateY(-2px);
        }

        .btn-settings {
            background-color: #34a853;
        }

        .btn-settings:hover {
            background-color: #2d8e47;
            transform: translateY(-2px);
        }

        .btn-test {
            background-color: #7b8a8a;
        }

        .btn-test:hover {
            background-color: #637171;
            transform: translateY(-2px);
        }

        /* Active click effect */
        .btn:active {
            transform: translateY(0);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>控制後台</h1>
        <div class="button-group">
            <a href="https://n8n220260704.app.n8n.cloud/form/7cb185fe-cfcc-4c9a-b8de-ccdec5163f7f" target="_blank" class="btn btn-sync">同步</a>
            <a href="https://docs.google.com/spreadsheets/d/1fwGQHxKa14EWIIwzUCEHJLo4OzpMrp7y5G2gP5MmW_k/edit?usp=sharing" target="_blank" class="btn btn-settings">設定</a>
            <a href="https://kentaitwds2.github.io/off_days_viewer.html" target="_blank" class="btn btn-test">測試</a>
        </div>
    </div>

</body>
</html>
